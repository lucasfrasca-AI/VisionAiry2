# ─────────────────────────────────────────────────────────────────────────────
# DISCOVERY — Mode 1 parameters
# ─────────────────────────────────────────────────────────────────────────────
discovery:
  trigger: manual
  lookback_window:
    quantitative_data_days: 7
    qualitative_data_days: 14
  scope:
    primary: sector_focused
    broad_scan: true
  top_n: 7
  report_depth: medium
  personas_per_candidate: [wood, druckenmiller, burry, lynch]
  estimated_cost_per_scan_usd: [1.20, 2.50]

# ─────────────────────────────────────────────────────────────────────────────
# LLM_ROUTING — every role used in src/llm/client.py.complete(role=...) maps here.
# `validate-keys` rewrites primary/fallback fields when a provider fails to authenticate.
# Models are intentionally referenced by string so they can be swapped without code edits.
# ─────────────────────────────────────────────────────────────────────────────
llm_routing:
  # ── Volume tasks (cheap, high-throughput) ─────────────────────────────────
  entity_extraction:
    provider: deepseek
    model: deepseek-chat            # V4 Flash
    fallback_provider: gemini
    fallback_model: gemini-2.5-flash
    max_tokens: 1024
    temperature: 0.0

  sector_classifier:
    provider: deepseek
    model: deepseek-chat
    fallback_provider: gemini
    fallback_model: gemini-2.5-flash
    max_tokens: 256
    temperature: 0.0

  document_summary:
    provider: gemini
    model: gemini-2.5-flash
    fallback_provider: deepseek
    fallback_model: deepseek-chat
    max_tokens: 2048
    temperature: 0.2

  source_dedupe:
    provider: deepseek
    model: deepseek-chat
    fallback_provider: gemini
    fallback_model: gemini-2.5-flash
    max_tokens: 512
    temperature: 0.0

  # ── Reasoning tasks ───────────────────────────────────────────────────────
  candidate_scoring:
    provider: deepseek
    model: deepseek-reasoner        # V4 Pro
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 4096
    temperature: 0.3

  persona_agents:
    provider: deepseek
    model: deepseek-reasoner
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 4096
    temperature: 0.5

  # ── Synthesis tasks ───────────────────────────────────────────────────────
  cross_candidate:
    provider: anthropic
    model: claude-haiku-4-5
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 4096
    temperature: 0.3

  daily_brief_writer:
    provider: anthropic
    model: claude-haiku-4-5
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 4096
    temperature: 0.4

  gap_analysis:
    provider: anthropic
    model: claude-haiku-4-5
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 2048
    temperature: 0.3

  report_writer:
    provider: anthropic
    model: claude-haiku-4-5
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 8192
    temperature: 0.4

  # ── Escalation (rarely invoked, expensive) ────────────────────────────────
  escalation:
    provider: anthropic
    model: claude-sonnet-4-6
    fallback_provider: gemini
    fallback_model: gemini-2.5-pro
    max_tokens: 8192
    temperature: 0.3

  # ── Generic fallback shorthand handles (reserved for cross-provider use) ──
  deepseek_fallback:
    provider: gemini
    model: gemini-2.5-flash
    fallback_provider: anthropic
    fallback_model: claude-haiku-4-5
    max_tokens: 2048
    temperature: 0.2

  claude_fallback:
    provider: gemini
    model: gemini-2.5-pro
    fallback_provider: deepseek
    fallback_model: deepseek-reasoner
    max_tokens: 4096
    temperature: 0.3
