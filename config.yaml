# VisionAiry2 — single source of truth
# Edit this file to change sectors, watchlist, discovery params, or LLM routing.
# Do not hardcode any of these values in code under src/.

# ─────────────────────────────────────────────────────────────────────────────
# SECTORS — 18 entries.
# Each: id (snake_case), label, keywords, optional arxiv_categories, specialist_sources.
# ─────────────────────────────────────────────────────────────────────────────
sectors:
  - id: ai_chips_compute
    label: AI Chips & Compute
    keywords: [GPU, AI accelerator, datacenter compute, HBM, NVLink, inference chip,
               training chip, TPU, neural processor, AI infrastructure, hyperscaler, photonics compute]
    arxiv_categories: [cs.AR, cs.DC]
    specialist_sources: [sec_edgar, github, semantic_scholar]

  - id: semiconductors_fab
    label: Semiconductors & Fabrication
    keywords: [foundry, EUV lithography, ASML, wafer, semiconductor equipment, advanced packaging,
               chiplet, gate-all-around, 3nm, 2nm, fab, photoresist]
    arxiv_categories: [cond-mat.mtrl-sci, physics.app-ph]
    specialist_sources: [sec_edgar, uspto]

  - id: ai_software
    label: AI Software & Foundation Models
    keywords: [foundation model, LLM, generative AI, AI agent, multimodal, RAG, fine-tuning,
               AI platform, MLOps, vector database, AI inference, AI infrastructure software]
    arxiv_categories: [cs.AI, cs.CL, cs.LG]
    specialist_sources: [github, semantic_scholar, arxiv]

  - id: cybersecurity
    label: Cybersecurity
    keywords: [zero trust, EDR, XDR, SIEM, SOAR, identity security, cloud security, threat intel,
               post-quantum cryptography, ransomware, vulnerability management, SASE]
    arxiv_categories: [cs.CR]
    specialist_sources: [sec_edgar, github]

  - id: quantum_frontier
    label: Quantum & Frontier Compute
    keywords: [quantum computing, qubit, quantum supremacy, photonic computing, neuromorphic,
               quantum error correction, superconducting qubit, ion trap, quantum networking, QKD]
    arxiv_categories: [quant-ph]
    specialist_sources: [arxiv, semantic_scholar, uspto]

  - id: space_satellites
    label: Space & Satellites
    keywords: [reusable rocket, satellite constellation, LEO, earth observation, space launch,
               in-orbit servicing, space domain awareness, lunar, Mars, propulsion, smallsat]
    specialist_sources: [sam_gov, sec_edgar]

  - id: humanoid_robotics
    label: Humanoid Robotics
    keywords: [humanoid robot, bipedal, dexterous manipulation, robot learning, embodied AI,
               teleoperation, exoskeleton, whole-body control, sim-to-real]
    arxiv_categories: [cs.RO]
    specialist_sources: [arxiv, github, uspto]

  - id: industrial_robotics
    label: Industrial Robotics & Automation
    keywords: [industrial automation, cobot, AMR, AGV, machine vision, factory automation,
               warehouse automation, robotic process, motion control, robot arm]
    arxiv_categories: [cs.RO]
    specialist_sources: [sec_edgar, uspto]

  - id: batteries_storage
    label: Batteries & Energy Storage
    keywords: [lithium-ion, solid-state battery, sodium-ion, LFP, NMC, grid storage, BESS,
               battery recycling, fast charging, gigafactory, anode, cathode]
    specialist_sources: [eia, uspto, sec_edgar]

  - id: nuclear_fusion
    label: Nuclear & Fusion
    keywords: [SMR, small modular reactor, nuclear fusion, tokamak, stellarator, ITER, fission,
               molten salt, advanced reactor, HALEU, breakeven, ignition]
    specialist_sources: [eia, sec_edgar, uspto]

  - id: critical_minerals
    label: Critical Minerals & Mining
    keywords: [lithium mining, rare earth, cobalt, nickel, graphite, copper supply, uranium,
               permanent magnet, mineral processing, extraction, ore body, refinery]
    specialist_sources: [sec_edgar, sam_gov]

  - id: oil_gas_traditional
    label: Oil, Gas & Traditional Energy
    keywords: [upstream, midstream, LNG, shale, refining, oilfield services, natural gas,
               pipeline, offshore, capex, drilling, Permian]
    specialist_sources: [eia, sec_edgar]

  - id: pharma_glp1
    label: Pharma, Peptides & GLP-1s
    keywords: [GLP-1, peptide therapeutic, obesity drug, semaglutide, tirzepatide, Phase 3,
               FDA approval, biosimilar, oral GLP-1, metabolic disease, NDA, BLA]
    specialist_sources: [openfda, pubmed, clinicaltrials]

  - id: genetic_cell_therapy
    label: Genetic Medicine & Cell Therapy
    keywords: [CRISPR, gene therapy, CAR-T, base editing, prime editing, AAV vector, mRNA,
               cell therapy, gene editing, ex vivo, in vivo, IND]
    specialist_sources: [openfda, pubmed, clinicaltrials, semantic_scholar]

  - id: medtech_diagnostics
    label: Medical Devices & Diagnostics
    keywords: [medical device, IVD, diagnostic, surgical robotics, imaging, point-of-care,
               continuous glucose, AI diagnostic, 510k, PMA, wearable medical]
    specialist_sources: [openfda, sec_edgar, uspto]

  - id: traditional_defence
    label: Traditional Defence
    keywords: [missile, fighter jet, naval, armoured vehicle, ammunition, prime contractor,
               DoD contract, FY budget, foreign military sales, sustainment, MRO]
    specialist_sources: [sam_gov, sec_edgar]

  - id: emerging_defence
    label: Emerging Defence Tech
    keywords: [autonomous weapons, loitering munition, counter-UAS, directed energy, hypersonic,
               military AI, electronic warfare, dual-use, drone swarm, battle network]
    specialist_sources: [sam_gov, github, uspto]

  - id: advanced_materials
    label: Advanced Materials
    keywords: [graphene, metamaterial, carbon nanotube, additive manufacturing, composites,
               superalloy, photovoltaic material, thermal management, MOF, novel polymer]
    arxiv_categories: [cond-mat.mtrl-sci]
    specialist_sources: [uspto, semantic_scholar, sec_edgar]

